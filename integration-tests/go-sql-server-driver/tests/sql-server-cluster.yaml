# Ported from Dolt's integration-tests/go-sql-server-driver/tests/sql-server-cluster.yaml.
#
# Doltgres does NOT yet implement cluster replication or the remotes API, so
# every test in this file is marked `skip:`. The SQL, config, and assertions are
# translated to Postgres/Doltgres faithfully so that this file is a ready spec
# for when the feature lands.
#
# Translation notes:
#   * The doltgres binary has a minimal CLI (--config, --data-dir). The listener
#     port/host/socket are auto-injected by the test framework, so config files
#     omit listener.port (and listener.host); they keep only log_level, behavior,
#     and cluster blocks. {{get_port ...}} templating is preserved where it
#     refers to OTHER servers' ports (cluster.remotesapi.port and
#     remote_url_template URLs).
#   * Dolt's CALL DOLT_X(...) / SELECT DOLT_X() become SELECT dolt_x(...). The
#     result column defaults to the function name and the value renders as a
#     Postgres array, e.g. {0}.
#   * Backtick identifiers become double-quoted identifiers.
#   * `select ... from dual` becomes `select ...`.
#   * MySQL system-variable access becomes Postgres: `SELECT @@GLOBAL.x` ->
#     `SELECT current_setting('x') AS x`, and `SET @@GLOBAL.x = v` /
#     `SET @@PERSIST.x = v` -> `SET x = v`.
parallel: true
tests:
- name: persisted role and epoch take precedence over bootstrap values
  multi_repos:
  - name: server1
    repos:
    - name: repo1
      with_remotes:
      - name: standby
        url: http://localhost:{{get_port "server2_cluster"}}/repo1
    - name: repo2
      with_remotes:
      - name: standby
        url: http://localhost:{{get_port "server2_cluster"}}/repo2
    with_files:
    - name: standby_server.yaml
      contents: |
        log_level: trace
        cluster:
          standby_remotes:
          - name: standby
            remote_url_template: http://localhost:{{get_port "server2_cluster"}}/{database}
          bootstrap_role: standby
          bootstrap_epoch: 10
          remotesapi:
            port: {{get_port "server1_cluster"}}
    - name: primary_server.yaml
      contents: |
        log_level: trace
        cluster:
          standby_remotes:
          - name: standby
            remote_url_template: http://localhost:{{get_port "server2_cluster"}}/{database}
          bootstrap_role: primary
          bootstrap_epoch: 15
          remotesapi:
            port: {{get_port "server1_cluster"}}
    server:
      args: ["--config", "standby_server.yaml"]
      dynamic_port: server1
  connections:
  - on: server1
    queries:
    - exec: "use dolt_cluster"
    - query: "select current_setting('dolt_cluster_role') AS dolt_cluster_role, current_setting('dolt_cluster_role_epoch') AS dolt_cluster_role_epoch"
      result:
        columns: ["dolt_cluster_role","dolt_cluster_role_epoch"]
        rows: [["standby","10"]]
    - query: |
        select "database", standby_remote, role, epoch from dolt_cluster_status order by "database" asc
      result:
        columns: ["database","standby_remote","role","epoch"]
        rows:
        - ["postgres","standby","standby","10"]
        - ["repo1","standby","standby","10"]
        - ["repo2","standby","standby","10"]
    restart_server:
      args: ["--config", "primary_server.yaml"]
  - on: server1
    queries:
    - exec: "use dolt_cluster"
    - query: "select current_setting('dolt_cluster_role') AS dolt_cluster_role, current_setting('dolt_cluster_role_epoch') AS dolt_cluster_role_epoch"
      result:
        columns: ["dolt_cluster_role","dolt_cluster_role_epoch"]
        rows: [["standby","10"]]
- name: dolt_assume_cluster_role
  multi_repos:
  - name: server1
    repos:
    - name: repo1
      with_remotes:
      - name: standby
        url: http://localhost:{{get_port "server2_cluster"}}/repo1
    - name: repo2
      with_remotes:
      - name: standby
        url: http://localhost:{{get_port "server2_cluster"}}/repo2
    with_files:
    - name: server.yaml
      contents: |
        log_level: trace
        cluster:
          standby_remotes:
          - name: standby
            remote_url_template: http://localhost:{{get_port "server2_cluster"}}/{database}
          bootstrap_role: standby
          bootstrap_epoch: 10
          remotesapi:
            port: {{get_port "server1_cluster"}}
    server:
      args: ["--config", "server.yaml"]
      dynamic_port: server1
  connections:
  - on: server1
    queries:
    - exec: "use repo1"
    - query: "select dolt_assume_cluster_role('standby', '9')"
      error_match: "error assuming role"
    - query: "select dolt_assume_cluster_role('primary', '10')"
      error_match: "error assuming role"
    - query: "select dolt_assume_cluster_role('backup', '11')"
      error_match: "error assuming role"
    - query: "select dolt_assume_cluster_role('standby', '10')"
      result:
        columns: ["dolt_assume_cluster_role"]
        rows: [["{0}"]]
    - query: "select current_setting('dolt_cluster_role') AS dolt_cluster_role, current_setting('dolt_cluster_role_epoch') AS dolt_cluster_role_epoch"
      result:
        columns: ["dolt_cluster_role","dolt_cluster_role_epoch"]
        rows: [["standby","10"]]
    - query: "select dolt_assume_cluster_role('standby', '12')"
      result:
        columns: ["dolt_assume_cluster_role"]
        rows: [["{0}"]]
    - query: "select current_setting('dolt_cluster_role') AS dolt_cluster_role, current_setting('dolt_cluster_role_epoch') AS dolt_cluster_role_epoch"
      result:
        columns: ["dolt_cluster_role","dolt_cluster_role_epoch"]
        rows: [["standby","12"]]
    - query: "select dolt_assume_cluster_role('primary', '13')"
      result:
        columns: ["dolt_assume_cluster_role"]
        rows: [["{0}"]]
    # Connection should be broken now.
    - query: "select 2"
      error_match: "this connection can no longer be used"
  - on: server1
    queries:
    - query: "select current_setting('dolt_cluster_role') AS dolt_cluster_role, current_setting('dolt_cluster_role_epoch') AS dolt_cluster_role_epoch"
      result:
        columns: ["dolt_cluster_role","dolt_cluster_role_epoch"]
        rows: [["primary","13"]]
    restart_server: {}
  # Assert that it comes back up with newly assumed role.
  - on: server1
    queries:
    - query: "select current_setting('dolt_cluster_role') AS dolt_cluster_role, current_setting('dolt_cluster_role_epoch') AS dolt_cluster_role_epoch"
      result:
        columns: ["dolt_cluster_role","dolt_cluster_role_epoch"]
        rows: [["primary","13"]]
