    - exec: 'insert into vals values (0),(1),(2),(3),(4)'
    - exec: 'create user aaron with password ''aaronspassword'''
    - exec: 'GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO aaron'
