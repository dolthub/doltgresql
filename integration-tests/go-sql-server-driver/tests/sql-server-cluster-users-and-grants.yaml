    - exec: 'GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO brian'
    - exec: 'delete from dolt_branch_control'
    - exec: 'insert into dolt_branch_control values (''repo1'', ''main'', ''aaron'', ''%'', ''admin'')'
