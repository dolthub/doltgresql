      contents: |
        log_level: trace
        cluster:
          standby_remotes:
          - name: standby1
            remote_url_template: http://localhost:{{get_port "server2_cluster"}}/{database}
          - name: standby2
            remote_url_template: http://localhost:{{get_port "server3_cluster"}}/{database}
